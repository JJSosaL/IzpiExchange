name: izpi_exchange

description: "Una aplicación multiplataforma (disponible para Android e iOS) que te permite hacer intercambio de objetos con otros alumnos del centro institucional"

publish_to: "none"

version: 0.1.0

environment:
    sdk: ^3.11.5

dependencies:
    flutter:
        sdk: flutter

    cupertino_icons: ^1.0.8
    google_fonts: ^8.0.2
    go_router: ^17.2.2
    http: ^1.6.0
    flutter_secure_storage: ^10.0.0
    socket_io_client: ^3.1.4
    package_info_plus: ^9.0.1
    url_launcher: ^6.3.2
    flutter_launcher_icons: ^0.14.4

dev_dependencies:
    flutter_test:
        sdk: flutter

    flutter_lints: ^6.0.0

flutter:
    uses-material-design: true

flutter_icons:
    android: true
    ios: true
    image_path: "assets/icon.png"
