        sdk: flutter

    cupertino_icons: ^1.0.8
    google_fonts: ^8.0.2
    go_router: ^17.2.1
    http: ^1.6.0

dev_dependencies:
    flutter_test:
        sdk: flutter

    flutter_lints: ^6.0.0

flutter:
    uses-material-design: true
